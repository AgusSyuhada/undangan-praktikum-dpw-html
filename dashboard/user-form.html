<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Pengguna - Dashboard Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script> tailwind.config = { theme: { extend: { colors: { wedding: { primary: '#c19a6b' } } } } } </script>
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #f3f4f6;
        }
    </style>
</head>

<body class="flex h-screen overflow-hidden">

    <aside class="w-64 bg-white shadow-md h-full flex flex-col z-10">
        <div class="p-6 border-b text-center">
            <h2 class="text-xl font-bold text-wedding-primary">Admin Panel</h2>
        </div>
        <nav class="flex-1 p-4 space-y-2">
            <a href="rsvp.html"
                class="block w-full text-left px-4 py-3 rounded-lg text-gray-600 hover:bg-gray-100 font-medium transition"><i
                    class="fas fa-envelope-open-text w-6"></i> Data RSVP</a>
            <a href="users.html"
                class="block w-full text-left px-4 py-3 rounded-lg bg-wedding-primary text-white font-medium transition"><i
                    class="fas fa-users-cog w-6"></i> Data Admin</a>
            <a href="guests.html"
                class="block w-full text-left px-4 py-3 rounded-lg text-gray-600 hover:bg-gray-100 font-medium transition"><i
                    class="fas fa-address-book w-6"></i> Nama Tamu (Link)</a>
            <a href="content.html"
                class="block w-full text-left px-4 py-3 rounded-lg text-gray-600 hover:bg-gray-100 font-medium transition"><i
                    class="fas fa-file-alt w-6"></i> Data Isi Halaman</a>
        </nav>
        <div class="p-4 border-t"><a href="../login.html"
                class="block text-center px-4 py-2 text-red-600 hover:bg-red-50 rounded-lg"><i
                    class="fas fa-sign-out-alt mr-2"></i> Logout</a></div>
    </aside>

    <main class="flex-1 p-8 overflow-y-auto">
        <div class="mb-6 flex items-center gap-3">
            <a href="users.html" class="text-gray-500 hover:text-wedding-primary transition"><i
                    class="fas fa-arrow-left text-xl"></i></a>
            <h2 class="text-2xl font-bold text-gray-800" id="form-title">Tambah Pengguna Baru</h2>
        </div>

        <div class="bg-white rounded-xl shadow-sm overflow-hidden p-8 max-w-2xl">
            <form onsubmit="handleFormSubmit(event)">

                <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Nama Lengkap</label>
                        <input type="text" id="nama" required
                            class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-wedding-primary focus:border-transparent outline-none transition"
                            placeholder="Masukkan nama lengkap">
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Username</label>
                        <div class="relative">
                            <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-gray-500">@</span>
                            <input type="text" id="username" required
                                class="w-full pl-8 pr-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-wedding-primary focus:border-transparent outline-none transition"
                                placeholder="username_anda">
                        </div>
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Email</label>
                        <input type="email" id="email" required
                            class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-wedding-primary focus:border-transparent outline-none transition"
                            placeholder="email@contoh.com">
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Password</label>
                        <input type="password" id="password" required
                            class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-wedding-primary focus:border-transparent outline-none transition"
                            placeholder="••••••••">
                    </div>
                </div>

                <div class="flex items-center gap-4 pt-4 border-t border-gray-100">
                    <a href="users.html"
                        class="px-6 py-2 bg-gray-100 text-gray-700 rounded-lg hover:bg-gray-200 font-medium transition text-center w-full md:w-auto">Batal</a>
                    <button type="submit"
                        class="px-6 py-2 bg-wedding-primary text-white rounded-lg hover:bg-yellow-700 font-medium transition w-full md:w-auto shadow-md">
                        <i class="fas fa-save mr-1"></i> Simpan Data
                    </button>
                </div>
            </form>
        </div>
    </main>

    <script>
        // Logika sederhana untuk mengecek apakah form ini untuk "Tambah" atau "Edit"
        // Menggunakan parameter URL (contoh: user-form.html?id=1)
        const urlParams = new URLSearchParams(window.location.search);
        const editId = urlParams.get('id');

        if (editId) {
            document.getElementById('form-title').innerText = "Edit Data Pengguna";

            // Dummy Auto-fill Data (Simulasi ngambil data dari database berdasarkan ID)
            if (editId === '1') {
                document.getElementById('nama').value = "Admin Utama";
                document.getElementById('username').value = "admin";
                document.getElementById('email').value = "admin@undangan.com";
                // Biasanya password tidak di-autofill untuk alasan keamanan, tapi ini versi dummy.
                document.getElementById('password').value = "123";
            }
        }

        function handleFormSubmit(event) {
            event.preventDefault();

            // Ambil data dari form
            const nama = document.getElementById('nama').value;
            const actionType = editId ? "diperbarui" : "ditambahkan";

            // Simulasi proses simpan
            alert(`Dummy: Data pengguna "${nama}" berhasil ${actionType}!`);

            // Kembali ke halaman tabel
            window.location.href = 'users.html';
        }
    </script>
</body>

</html>
