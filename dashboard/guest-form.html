<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Tamu - Dashboard Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script> tailwind.config = { theme: { extend: { colors: { wedding: { primary: '#c19a6b' } } } } } </script>
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #f3f4f6;
        }
    </style>
</head>

<body class="flex h-screen overflow-hidden bg-gray-100">

    <div id="sidebarOverlay" class="fixed inset-0 bg-gray-900 bg-opacity-50 z-40 hidden md:hidden transition-opacity"
        onclick="toggleSidebar()"></div>

    <aside id="sidebar"
        class="fixed inset-y-0 left-0 transform -translate-x-full md:relative md:translate-x-0 transition duration-300 ease-in-out z-50 w-64 bg-white shadow-md h-full flex flex-col">
        <div class="p-6 border-b text-center flex justify-between items-center md:block">
            <h2 class="text-xl font-bold text-wedding-primary">Admin Panel</h2>
            <button class="md:hidden text-gray-500 hover:text-red-500" onclick="toggleSidebar()"><i
                    class="fas fa-times text-xl"></i></button>
        </div>
        <nav class="flex-1 p-4 space-y-2 overflow-y-auto">
            <a href="rsvp.html"
                class="block w-full text-left px-4 py-3 rounded-lg text-gray-600 hover:bg-gray-100 font-medium transition"><i
                    class="fas fa-envelope-open-text w-6"></i> Data RSVP</a>
            <a href="users.html"
                class="block w-full text-left px-4 py-3 rounded-lg text-gray-600 hover:bg-gray-100 font-medium transition"><i
                    class="fas fa-users-cog w-6"></i> Data Admin</a>
            <a href="guests.html"
                class="block w-full text-left px-4 py-3 rounded-lg bg-wedding-primary text-white font-medium transition"><i
                    class="fas fa-address-book w-6"></i> Nama Tamu (Link)</a>
            <a href="content.html"
                class="block w-full text-left px-4 py-3 rounded-lg text-gray-600 hover:bg-gray-100 font-medium transition"><i
                    class="fas fa-file-alt w-6"></i> Data Isi Halaman</a>
        </nav>
        <div class="p-4 border-t">
            <button onclick="openLogoutModal()"
                class="block w-full text-center px-4 py-2 text-red-600 hover:bg-red-50 rounded-lg transition"><i
                    class="fas fa-sign-out-alt mr-2"></i> Logout</button>
        </div>
    </aside>

    <main class="flex-1 flex flex-col min-w-0 overflow-y-auto">
        <header class="md:hidden flex items-center justify-between p-4 bg-white shadow-sm border-b sticky top-0 z-30">
            <h1 class="text-lg font-bold text-wedding-primary">Form Tamu</h1>
            <button onclick="toggleSidebar()" class="text-gray-600 p-2"><i class="fas fa-bars text-2xl"></i></button>
        </header>

        <div class="p-4 md:p-8">
            <div class="mb-6 flex items-center gap-3">
                <a href="guests.html" class="text-gray-500 hover:text-wedding-primary transition"><i
                        class="fas fa-arrow-left text-xl"></i></a>
                <h2 class="text-2xl font-bold text-gray-800" id="form-title">Tambah Tamu Baru</h2>
            </div>

            <div class="bg-white rounded-xl shadow-sm overflow-hidden p-6 md:p-8 max-w-xl mx-auto md:mx-0">
                <form onsubmit="handleFormSubmit(event)">

                    <div class="mb-8">
                        <label class="block text-sm font-medium text-gray-700 mb-2">Nama Tamu Undangan</label>
                        <input type="text" id="nama-tamu" required
                            class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-wedding-primary focus:border-transparent outline-none transition"
                            placeholder="Contoh: Bapak Budi Santoso & Keluarga">
                        <p class="text-xs text-gray-500 mt-2">*Nama ini akan ditampilkan pada halaman Cover Undangan dan
                            URL (Link).</p>
                    </div>

                    <div class="flex flex-col md:flex-row items-center gap-4 pt-4 border-t border-gray-100">
                        <a href="guests.html"
                            class="px-6 py-2 bg-gray-100 text-gray-700 rounded-lg hover:bg-gray-200 font-medium transition text-center w-full md:w-auto">Batal</a>
                        <button type="submit"
                            class="px-6 py-2 bg-wedding-primary text-white rounded-lg hover:bg-yellow-700 font-medium transition w-full md:w-auto shadow-md">
                            <i class="fas fa-save mr-1"></i> Simpan Data
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </main>

    <div id="logoutModal"
        class="fixed inset-0 z-[60] hidden bg-gray-900 bg-opacity-50 flex items-center justify-center p-4 transition-opacity">
        <div class="bg-white rounded-xl shadow-2xl p-6 w-full max-w-sm transform scale-95 transition-transform"
            id="logoutModalContent">
            <div class="text-center">
                <div class="mx-auto flex items-center justify-center h-12 w-12 rounded-full bg-red-100 mb-4">
                    <i class="fas fa-sign-out-alt text-red-600 text-xl"></i>
                </div>
                <h3 class="text-lg font-bold text-gray-900 mb-2">Konfirmasi Logout</h3>
                <p class="text-sm text-gray-500 mb-6">Apakah Anda yakin ingin keluar dari halaman dashboard?</p>
                <div class="flex gap-3 justify-center">
                    <button onclick="closeLogoutModal()"
                        class="px-4 py-2 bg-gray-100 text-gray-700 rounded-lg hover:bg-gray-200 font-medium transition w-full">Batal</button>
                    <a href="../login.html"
                        class="px-4 py-2 bg-red-600 text-white rounded-lg hover:bg-red-700 font-medium transition w-full text-center">Keluar</a>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Cek apakah mode "Tambah" atau "Edit" menggunakan Parameter URL ?id=
        const urlParams = new URLSearchParams(window.location.search);
        const editId = urlParams.get('id');

        if (editId) {
            document.getElementById('form-title').innerText = "Edit Data Tamu";

            // Dummy Auto-fill Data
            if (editId === '1') {
                document.getElementById('nama-tamu').value = "Bapak H. Fulan";
            } else if (editId === '2') {
                document.getElementById('nama-tamu').value = "Rayhan Al Farassy";
            } else if (editId === '3') {
                document.getElementById('nama-tamu').value = "M. Hashfi Fanny AYD";
            }
        }

        function handleFormSubmit(event) {
            event.preventDefault();

            const nama = document.getElementById('nama-tamu').value;
            const actionType = editId ? "diperbarui" : "ditambahkan";

            alert(`Data tamu "${nama}" berhasil ${actionType}!`);

            // Redirect kembali ke tabel
            window.location.href = 'guests.html';
        }

        // Script Sidebar Mobile
        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('-translate-x-full');
            document.getElementById('sidebarOverlay').classList.toggle('hidden');
        }

        // Script Modal Logout
        function openLogoutModal() {
            document.getElementById('logoutModal').classList.remove('hidden');
            setTimeout(() => { document.getElementById('logoutModalContent').classList.replace('scale-95', 'scale-100'); }, 10);
        }

        function closeLogoutModal() {
            document.getElementById('logoutModalContent').classList.replace('scale-100', 'scale-95');
            setTimeout(() => { document.getElementById('logoutModal').classList.add('hidden'); }, 150);
        }
    </script>
</body>

</html>
