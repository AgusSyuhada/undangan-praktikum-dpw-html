<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Isi Halaman - Dashboard Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script> tailwind.config = { theme: { extend: { colors: { wedding: { primary: '#c19a6b' } } } } } </script>
    <style> body { font-family: 'Poppins', sans-serif; background-color: #f3f4f6; } </style>
</head>
<body class="flex h-screen overflow-hidden">

    <aside class="w-64 bg-white shadow-md h-full flex flex-col z-10">
        <div class="p-6 border-b text-center"><h2 class="text-xl font-bold text-wedding-primary">Admin Panel</h2></div>
        <nav class="flex-1 p-4 space-y-2">
            <a href="rsvp.html" class="block w-full text-left px-4 py-3 rounded-lg text-gray-600 hover:bg-gray-100 font-medium transition"><i class="fas fa-envelope-open-text w-6"></i> Data RSVP</a>
            <a href="users.html" class="block w-full text-left px-4 py-3 rounded-lg text-gray-600 hover:bg-gray-100 font-medium transition"><i class="fas fa-users-cog w-6"></i> Data Admin</a>
            <a href="guests.html" class="block w-full text-left px-4 py-3 rounded-lg text-gray-600 hover:bg-gray-100 font-medium transition"><i class="fas fa-address-book w-6"></i> Nama Tamu (Link)</a>
            <a href="content.html" class="block w-full text-left px-4 py-3 rounded-lg bg-wedding-primary text-white font-medium transition"><i class="fas fa-file-alt w-6"></i> Data Isi Halaman</a>
        </nav>
        <div class="p-4 border-t"><a href="../login.html" class="block text-center px-4 py-2 text-red-600 hover:bg-red-50 rounded-lg"><i class="fas fa-sign-out-alt mr-2"></i> Logout</a></div>
    </aside>

    <main class="flex-1 p-8 overflow-y-auto">
        <h2 class="text-2xl font-bold text-gray-800 mb-6">Manajemen Teks & Gambar</h2>
        <div class="bg-white rounded-xl shadow-sm overflow-hidden">
            <table class="w-full text-left border-collapse">
                <thead>
                    <tr class="bg-gray-50 border-b">
                        <th class="p-4 text-sm font-semibold text-gray-600">Bagian (Tipe)</th>
                        <th class="p-4 text-sm font-semibold text-gray-600">Isi / Preview</th>
                        <th class="p-4 text-sm font-semibold text-gray-600 w-24">Aksi</th>
                    </tr>
                </thead>
                <tbody id="table-body" class="divide-y"></tbody>
            </table>
        </div>
    </main>

    <script>
        const dataContent = [
            { tipe: 'teks', bagian: 'Judul Cover (Nama Mempelai)', isi: 'Romeo & Juliet' },
            { tipe: 'gambar', bagian: 'Background Cover URL', isi: 'https://placehold.co/1080x1920/4a4a4a/white?text=Cover+Background' },
            { tipe: 'teks', bagian: 'Tanggal Akad', isi: 'Sabtu, 20 Juni 2026' },
            { tipe: 'gambar', bagian: 'Foto Mempelai Pria URL', isi: 'https://placehold.co/300x400/c19a6b/white?text=Foto+Mempelai+Pria' },
            { tipe: 'teks', bagian: 'Nomor Rekening BCA', isi: '1234567890' }
        ];

        const tbody = document.getElementById('table-body');
        dataContent.forEach(item => {
            let isiDisplay = item.isi;
            
            // Jika tipe gambar, tampilkan juga preview kecil
            if (item.tipe === 'gambar') {
                isiDisplay = `
                    <div class="flex items-center gap-4">
                        <img src="${item.isi}" alt="preview" class="w-16 h-16 object-cover rounded border">
                        <span class="text-gray-500 text-sm truncate max-w-xs block">${item.isi}</span>
                    </div>
                `;
            }

            tbody.innerHTML += `
                <tr class="hover:bg-gray-50">
                    <td class="p-4">
                        <p class="font-medium text-gray-800">${item.bagian}</p>
                        <span class="text-xs bg-gray-200 text-gray-600 px-2 py-1 rounded uppercase tracking-wider">${item.tipe}</span>
                    </td>
                    <td class="p-4 text-gray-700">${isiDisplay}</td>
                    <td class="p-4">
                        <button class="text-blue-500 hover:text-blue-700 text-sm font-medium transition"><i class="fas fa-edit"></i> Edit</button>
                    </td>
                </tr>
            `;
        });
    </script>
</body>
</html>
