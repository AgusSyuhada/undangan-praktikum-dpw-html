<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Konten - Dashboard Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script> tailwind.config = { theme: { extend: { colors: { wedding: { primary: '#c19a6b' } } } } } </script>
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #f3f4f6;
        }
    </style>
</head>

<body class="flex h-screen overflow-hidden bg-gray-100">

    <div id="sidebarOverlay" class="fixed inset-0 bg-gray-900 bg-opacity-50 z-40 hidden md:hidden transition-opacity"
        onclick="toggleSidebar()"></div>

    <aside id="sidebar"
        class="fixed inset-y-0 left-0 transform -translate-x-full md:relative md:translate-x-0 transition duration-300 ease-in-out z-50 w-64 bg-white shadow-md h-full flex flex-col">
        <div class="p-6 border-b text-center flex justify-between items-center md:block">
            <h2 class="text-xl font-bold text-wedding-primary">Admin Panel</h2>
            <button class="md:hidden text-gray-500 hover:text-red-500" onclick="toggleSidebar()"><i
                    class="fas fa-times text-xl"></i></button>
        </div>
        <nav class="flex-1 p-4 space-y-2 overflow-y-auto">
            <a href="rsvp.html"
                class="block w-full text-left px-4 py-3 rounded-lg text-gray-600 hover:bg-gray-100 font-medium transition"><i
                    class="fas fa-envelope-open-text w-6"></i> Data RSVP</a>
            <a href="users.html"
                class="block w-full text-left px-4 py-3 rounded-lg text-gray-600 hover:bg-gray-100 font-medium transition"><i
                    class="fas fa-users-cog w-6"></i> Data Admin</a>
            <a href="guests.html"
                class="block w-full text-left px-4 py-3 rounded-lg text-gray-600 hover:bg-gray-100 font-medium transition"><i
                    class="fas fa-address-book w-6"></i> Nama Tamu (Link)</a>
            <a href="content.html"
                class="block w-full text-left px-4 py-3 rounded-lg bg-wedding-primary text-white font-medium transition"><i
                    class="fas fa-file-alt w-6"></i> Data Isi Halaman</a>
        </nav>
        <div class="p-4 border-t">
            <button onclick="openLogoutModal()"
                class="block w-full text-center px-4 py-2 text-red-600 hover:bg-red-50 rounded-lg transition"><i
                    class="fas fa-sign-out-alt mr-2"></i> Logout</button>
        </div>
    </aside>

    <main class="flex-1 flex flex-col min-w-0 overflow-y-auto">
        <header class="md:hidden flex items-center justify-between p-4 bg-white shadow-sm border-b sticky top-0 z-30">
            <h1 class="text-lg font-bold text-wedding-primary">Edit Konten</h1>
            <button onclick="toggleSidebar()" class="text-gray-600 p-2"><i class="fas fa-bars text-2xl"></i></button>
        </header>

        <div class="p-4 md:p-8">
            <div class="mb-6 flex items-center gap-3">
                <a href="content.html" class="text-gray-500 hover:text-wedding-primary transition"><i
                        class="fas fa-arrow-left text-xl"></i></a>
                <div>
                    <h2 class="text-2xl font-bold text-gray-800">Edit Konten</h2>
                    <p class="text-sm text-gray-500" id="form-subtitle">Memuat data...</p>
                </div>
            </div>

            <div class="bg-white rounded-xl shadow-sm overflow-hidden p-6 md:p-8 max-w-2xl mx-auto md:mx-0">
                <form onsubmit="handleFormSubmit(event)">

                    <div class="mb-8">
                        <label class="block text-sm font-semibold text-gray-800 mb-2" id="input-label">Isi
                            Konten</label>
                        <p class="text-xs text-gray-500 mb-4" id="input-hint">Pembaruan data ini akan langsung mengubah
                            tampilan di halaman utama undangan.</p>

                        <div id="dynamic-input-area"></div>
                    </div>

                    <div class="flex flex-col md:flex-row items-center gap-4 pt-4 border-t border-gray-100">
                        <a href="content.html"
                            class="px-6 py-2 bg-gray-100 text-gray-700 rounded-lg hover:bg-gray-200 font-medium transition text-center w-full md:w-auto">Batal</a>
                        <button type="submit"
                            class="px-6 py-2 bg-wedding-primary text-white rounded-lg hover:bg-yellow-700 font-medium transition w-full md:w-auto shadow-md">
                            <i class="fas fa-save mr-1"></i> Simpan Perubahan
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </main>

    <div id="logoutModal"
        class="fixed inset-0 z-[60] hidden bg-gray-900 bg-opacity-50 flex items-center justify-center p-4 transition-opacity">
        <div class="bg-white rounded-xl shadow-2xl p-6 w-full max-w-sm transform scale-95 transition-transform"
            id="logoutModalContent">
            <div class="text-center">
                <div class="mx-auto flex items-center justify-center h-12 w-12 rounded-full bg-red-100 mb-4">
                    <i class="fas fa-sign-out-alt text-red-600 text-xl"></i>
                </div>
                <h3 class="text-lg font-bold text-gray-900 mb-2">Konfirmasi Logout</h3>
                <p class="text-sm text-gray-500 mb-6">Apakah Anda yakin ingin keluar dari halaman dashboard?</p>
                <div class="flex gap-3 justify-center">
                    <button onclick="closeLogoutModal()"
                        class="px-4 py-2 bg-gray-100 text-gray-700 rounded-lg hover:bg-gray-200 font-medium transition w-full">Batal</button>
                    <a href="../login.html"
                        class="px-4 py-2 bg-red-600 text-white rounded-lg hover:bg-red-700 font-medium transition w-full text-center">Keluar</a>
                </div>
            </div>
        </div>
    </div>

    <script>
        const dummyDatabase = {
            'c_judul': { tipe: 'teks', bagian: 'Judul Cover (Nama Mempelai)', isi: 'Romeo & Juliet' },
            'c_bg': { tipe: 'gambar', bagian: 'Background Cover (URL)', isi: 'https://placehold.co/1080x1920/4a4a4a/white?text=Cover+Background' },
            'c_ayat': { tipe: 'textarea', bagian: 'Kutipan Ayat (Teks Atas)', isi: '"Dan di antara tanda-tanda kekuasaan-Nya..." (QS. Ar-Rum: 21)' },
            'm_foto_pria': { tipe: 'gambar', bagian: 'Foto Mempelai Pria (URL)', isi: 'https://placehold.co/300x400/c19a6b/white?text=Foto+Mempelai+Pria' },
            'm_nama_pria': { tipe: 'teks', bagian: 'Nama Mempelai Pria', isi: 'Romeo Montague, S.Kom.' },
            'l_mengundang': { tipe: 'textarea', bagian: 'Turut Mengundang', isi: '1. Bapak H. Fulano & Ibu Hj. Fulanah\n2. Bapak H. Bejo & Ibu Hj. Bejowati\n3. Rayhan Al Farassy\n4. M. Hashfi Fanny AYD' }
        };

        const urlParams = new URLSearchParams(window.location.search);
        const editId = urlParams.get('id');

        const targetData = dummyDatabase[editId] || { tipe: 'teks', bagian: 'Konten Tidak Ditemukan/Lainnya', isi: 'Data Dummy' };

        document.getElementById('form-subtitle').innerText = `Bagian: ${targetData.bagian}`;
        document.getElementById('input-label').innerText = `Ubah nilai untuk ${targetData.bagian}`;

        const dynamicArea = document.getElementById('dynamic-input-area');

        if (targetData.tipe === 'textarea') {
            dynamicArea.innerHTML = `
                <textarea id="content-input" required rows="6" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-wedding-primary focus:border-transparent outline-none transition">${targetData.isi}</textarea>
            `;
        } else if (targetData.tipe === 'gambar') {
            dynamicArea.innerHTML = `
                <input type="url" id="content-input" required value="${targetData.isi}" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-wedding-primary focus:border-transparent outline-none transition mb-4" placeholder="Masukkan URL Gambar/Icon">
                <div class="bg-gray-50 p-4 border border-gray-200 rounded-lg text-center">
                    <p class="text-xs text-gray-500 mb-2 font-medium">Preview Gambar Saat Ini:</p>
                    <img src="${targetData.isi}" alt="Preview" class="max-h-48 mx-auto rounded shadow-sm w-full object-contain">
                </div>
            `;
        } else {
            dynamicArea.innerHTML = `
                <input type="text" id="content-input" required value="${targetData.isi}" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-wedding-primary focus:border-transparent outline-none transition">
            `;
        }

        function handleFormSubmit(event) {
            event.preventDefault();
            const newValue = document.getElementById('content-input').value;
            alert(`Konten untuk "${targetData.bagian}" berhasil diperbarui!\n\nNilai baru: ${newValue}`);
            window.location.href = 'content.html';
        }

        // Script Sidebar Mobile
        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('-translate-x-full');
            document.getElementById('sidebarOverlay').classList.toggle('hidden');
        }

        // Script Modal Logout
        function openLogoutModal() {
            document.getElementById('logoutModal').classList.remove('hidden');
            setTimeout(() => { document.getElementById('logoutModalContent').classList.replace('scale-95', 'scale-100'); }, 10);
        }

        function closeLogoutModal() {
            document.getElementById('logoutModalContent').classList.replace('scale-100', 'scale-95');
            setTimeout(() => { document.getElementById('logoutModal').classList.add('hidden'); }, 150);
        }
    </script>
</body>

</html>
