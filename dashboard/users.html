<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Admin - Dashboard Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script> tailwind.config = { theme: { extend: { colors: { wedding: { primary: '#c19a6b' } } } } } </script>
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #f3f4f6;
        }
    </style>
</head>

<body class="flex h-screen overflow-hidden">

    <aside class="w-64 bg-white shadow-md h-full flex flex-col z-10">
        <div class="p-6 border-b text-center">
            <h2 class="text-xl font-bold text-wedding-primary">Admin Panel</h2>
        </div>
        <nav class="flex-1 p-4 space-y-2">
            <a href="rsvp.html"
                class="block w-full text-left px-4 py-3 rounded-lg text-gray-600 hover:bg-gray-100 font-medium transition"><i
                    class="fas fa-envelope-open-text w-6"></i> Data RSVP</a>
            <a href="users.html"
                class="block w-full text-left px-4 py-3 rounded-lg bg-wedding-primary text-white font-medium transition"><i
                    class="fas fa-users-cog w-6"></i> Data Admin</a>
            <a href="guests.html"
                class="block w-full text-left px-4 py-3 rounded-lg text-gray-600 hover:bg-gray-100 font-medium transition"><i
                    class="fas fa-address-book w-6"></i> Nama Tamu (Link)</a>
            <a href="content.html"
                class="block w-full text-left px-4 py-3 rounded-lg text-gray-600 hover:bg-gray-100 font-medium transition"><i
                    class="fas fa-file-alt w-6"></i> Data Isi Halaman</a>
        </nav>
        <div class="p-4 border-t"><a href="../login.html"
                class="block text-center px-4 py-2 text-red-600 hover:bg-red-50 rounded-lg"><i
                    class="fas fa-sign-out-alt mr-2"></i> Logout</a></div>
    </aside>

    <main class="flex-1 p-8 overflow-y-auto relative">
        <div class="flex justify-between items-center mb-6">
            <h2 class="text-2xl font-bold text-gray-800">Data Pengguna (Akses Dashboard)</h2>
            <a href="user-form.html"
                class="bg-wedding-primary text-white px-4 py-2 rounded-lg text-sm shadow hover:bg-yellow-700 transition"><i
                    class="fas fa-plus mr-1"></i> Tambah Pengguna</a>
        </div>

        <div class="bg-white rounded-xl shadow-sm overflow-hidden">
            <table class="w-full text-left border-collapse">
                <thead>
                    <tr class="bg-gray-50 border-b">
                        <th class="p-4 text-sm font-semibold text-gray-600 w-12">No</th>
                        <th class="p-4 text-sm font-semibold text-gray-600">Nama Lengkap</th>
                        <th class="p-4 text-sm font-semibold text-gray-600">Username</th>
                        <th class="p-4 text-sm font-semibold text-gray-600">Email</th>
                        <th class="p-4 text-sm font-semibold text-gray-600 text-center">Aksi</th>
                    </tr>
                </thead>
                <tbody id="table-body" class="divide-y"></tbody>
            </table>
        </div>
    </main>

    <div id="deleteModal"
        class="fixed inset-0 z-50 hidden bg-gray-900 bg-opacity-50 flex items-center justify-center transition-opacity">
        <div class="bg-white rounded-xl shadow-2xl p-6 w-full max-w-sm transform scale-95 transition-transform"
            id="modalContent">
            <div class="text-center">
                <div class="mx-auto flex items-center justify-center h-12 w-12 rounded-full bg-red-100 mb-4">
                    <i class="fas fa-exclamation-triangle text-red-600 text-xl"></i>
                </div>
                <h3 class="text-lg font-bold text-gray-900 mb-2">Hapus Pengguna?</h3>
                <p class="text-sm text-gray-500 mb-6">Apakah Anda yakin ingin menghapus data ini? Tindakan ini tidak
                    dapat dibatalkan.</p>
                <div class="flex gap-3 justify-center">
                    <button onclick="closeModal()"
                        class="px-4 py-2 bg-gray-100 text-gray-700 rounded-lg hover:bg-gray-200 font-medium transition w-full">Batal</button>
                    <button onclick="confirmDelete()"
                        class="px-4 py-2 bg-red-600 text-white rounded-lg hover:bg-red-700 font-medium transition w-full">Ya,
                        Hapus</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Dummy Data Lengkap (Password disembunyikan di tabel untuk keamanan)
        let dataUsers = [
            { id: 1, nama: 'Admin Utama', username: 'admin', email: 'admin@undangan.com', password: '123' },
            { id: 2, nama: 'Romeo Montague', username: 'romeo', email: 'romeo@gmail.com', password: 'abc' },
            { id: 3, nama: 'Juliet Capulet', username: 'juliet', email: 'juliet@gmail.com', password: 'xyz' }
        ];

        let deleteTargetId = null;

        function renderTable() {
            const tbody = document.getElementById('table-body');
            tbody.innerHTML = '';

            dataUsers.forEach((user, index) => {
                tbody.innerHTML += `
                    <tr class="hover:bg-gray-50">
                        <td class="p-4 text-gray-500">${index + 1}</td>
                        <td class="p-4 font-medium text-gray-800">${user.nama}</td>
                        <td class="p-4 text-gray-600">@${user.username}</td>
                        <td class="p-4 text-gray-600">${user.email}</td>
                        <td class="p-4 text-center">
                            <div class="flex justify-center gap-2">
                                <a href="user-form.html?id=${user.id}" class="bg-blue-50 text-blue-600 hover:bg-blue-100 px-3 py-1 rounded text-sm font-medium transition">
                                    <i class="fas fa-edit"></i> Edit
                                </a>
                                <button onclick="openModal(${user.id})" class="bg-red-50 text-red-600 hover:bg-red-100 px-3 py-1 rounded text-sm font-medium transition">
                                    <i class="fas fa-trash-alt"></i> Hapus
                                </button>
                            </div>
                        </td>
                    </tr>
                `;
            });
        }

        // --- Logika Modal ---
        const modal = document.getElementById('deleteModal');
        const modalContent = document.getElementById('modalContent');

        function openModal(id) {
            deleteTargetId = id;
            modal.classList.remove('hidden');
            setTimeout(() => { modalContent.classList.remove('scale-95'); modalContent.classList.add('scale-100'); }, 10);
        }

        function closeModal() {
            deleteTargetId = null;
            modalContent.classList.remove('scale-100');
            modalContent.classList.add('scale-95');
            setTimeout(() => { modal.classList.add('hidden'); }, 150);
        }

        function confirmDelete() {
            // Logika Hapus Dummy (Filter array)
            dataUsers = dataUsers.filter(user => user.id !== deleteTargetId);
            renderTable();
            closeModal();

            // Opsional alert notifikasi sukses
            setTimeout(() => { alert("Data berhasil dihapus (Dummy)"); }, 200);
        }

        // Render pertama kali
        renderTable();
    </script>
</body>

</html>
