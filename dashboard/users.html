<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Admin - Dashboard Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script> tailwind.config = { theme: { extend: { colors: { wedding: { primary: '#c19a6b' } } } } } </script>
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #f3f4f6;
        }

        .custom-scrollbar::-webkit-scrollbar {
            height: 4px;
        }

        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #c19a6b;
            border-radius: 10px;
        }
    </style>
</head>

<body class="flex h-screen overflow-hidden">

    <div id="sidebarOverlay" class="fixed inset-0 bg-gray-900 bg-opacity-50 z-40 hidden md:hidden"
        onclick="toggleSidebar()"></div>

    <aside id="sidebar"
        class="fixed inset-y-0 left-0 transform -translate-x-full md:relative md:translate-x-0 transition duration-300 ease-in-out z-50 w-64 bg-white shadow-md h-full flex flex-col">
        <div class="p-6 border-b text-center flex justify-between items-center md:block">
            <h2 class="text-xl font-bold text-wedding-primary">Admin Panel</h2>
            <button class="md:hidden text-gray-500" onclick="toggleSidebar()"><i
                    class="fas fa-times text-xl"></i></button>
        </div>
        <nav class="flex-1 p-4 space-y-2 overflow-y-auto">
            <a href="rsvp.html"
                class="block w-full text-left px-4 py-3 rounded-lg text-gray-600 hover:bg-gray-100 font-medium transition"><i
                    class="fas fa-envelope-open-text w-6"></i> Data RSVP</a>
            <a href="users.html"
                class="block w-full text-left px-4 py-3 rounded-lg bg-wedding-primary text-white font-medium transition"><i
                    class="fas fa-users-cog w-6"></i> Data Admin</a>
            <a href="guests.html"
                class="block w-full text-left px-4 py-3 rounded-lg text-gray-600 hover:bg-gray-100 font-medium transition"><i
                    class="fas fa-address-book w-6"></i> Nama Tamu (Link)</a>
            <a href="content.html"
                class="block w-full text-left px-4 py-3 rounded-lg text-gray-600 hover:bg-gray-100 font-medium transition"><i
                    class="fas fa-file-alt w-6"></i> Data Isi Halaman</a>
        </nav>
        <div class="p-4 border-t">
            <button onclick="openLogoutModal()"
                class="block w-full text-center px-4 py-2 text-red-600 hover:bg-red-50 rounded-lg transition"><i
                    class="fas fa-sign-out-alt mr-2"></i> Logout</button>
        </div>
    </aside>

    <main class="flex-1 flex flex-col min-w-0">
        <header class="md:hidden flex items-center justify-between p-4 bg-white shadow-sm border-b">
            <h1 class="text-lg font-bold text-wedding-primary">Data Admin</h1>
            <button onclick="toggleSidebar()" class="text-gray-600 p-2"><i class="fas fa-bars text-2xl"></i></button>
        </header>

        <div class="p-4 md:p-8 overflow-y-auto flex-1">
            <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 mb-6">
                <h2 class="text-2xl font-bold text-gray-800">Data Pengguna</h2>
                <a href="user-form.html"
                    class="bg-wedding-primary text-white px-4 py-2 rounded-lg text-sm shadow hover:bg-yellow-700 transition w-full md:w-auto text-center"><i
                        class="fas fa-plus mr-1"></i> Tambah Pengguna</a>
            </div>

            <div class="bg-white rounded-xl shadow-sm overflow-x-auto custom-scrollbar">
                <table class="w-full text-left border-collapse min-w-[700px]">
                    <thead>
                        <tr class="bg-gray-50 border-b">
                            <th class="p-4 text-sm font-semibold text-gray-600 w-12">No</th>
                            <th class="p-4 text-sm font-semibold text-gray-600">Nama Lengkap</th>
                            <th class="p-4 text-sm font-semibold text-gray-600">Username</th>
                            <th class="p-4 text-sm font-semibold text-gray-600">Email</th>
                            <th class="p-4 text-sm font-semibold text-gray-600 text-center">Aksi</th>
                        </tr>
                    </thead>
                    <tbody id="table-body" class="divide-y"></tbody>
                </table>
            </div>
        </div>
    </main>

    <div id="deleteModal"
        class="fixed inset-0 z-50 hidden bg-gray-900 bg-opacity-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-xl shadow-2xl p-6 w-full max-w-sm transform scale-95 transition-transform"
            id="modalContent">
            <div class="text-center">
                <div class="mx-auto flex items-center justify-center h-12 w-12 rounded-full bg-red-100 mb-4"><i
                        class="fas fa-exclamation-triangle text-red-600 text-xl"></i></div>
                <h3 class="text-lg font-bold text-gray-900 mb-2">Hapus Pengguna?</h3>
                <p class="text-sm text-gray-500 mb-6">Tindakan ini tidak dapat dibatalkan.</p>
                <div class="flex gap-3">
                    <button onclick="closeModal()"
                        class="px-4 py-2 bg-gray-100 text-gray-700 rounded-lg w-full">Batal</button>
                    <button onclick="confirmDelete()" class="px-4 py-2 bg-red-600 text-white rounded-lg w-full">Ya,
                        Hapus</button>
                </div>
            </div>
        </div>
    </div>

    <div id="logoutModal"
        class="fixed inset-0 z-[60] hidden bg-gray-900 bg-opacity-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-xl shadow-2xl p-6 w-full max-w-sm transform scale-95 transition-transform"
            id="logoutModalContent">
            <div class="text-center">
                <div class="mx-auto flex items-center justify-center h-12 w-12 rounded-full bg-red-100 mb-4"><i
                        class="fas fa-sign-out-alt text-red-600 text-xl"></i></div>
                <h3 class="text-lg font-bold text-gray-900 mb-2">Konfirmasi Logout</h3>
                <p class="text-sm text-gray-500 mb-6">Apakah Anda yakin ingin keluar?</p>
                <div class="flex gap-3">
                    <button onclick="closeLogoutModal()"
                        class="px-4 py-2 bg-gray-100 text-gray-700 rounded-lg w-full">Batal</button>
                    <a href="../login.html"
                        class="px-4 py-2 bg-red-600 text-white rounded-lg w-full text-center">Keluar</a>
                </div>
            </div>
        </div>
    </div>

    <script>
        let dataUsers = [
            { id: 1, nama: 'Admin Utama', username: 'admin', email: 'admin@undangan.com' },
            { id: 2, nama: 'Romeo Montague', username: 'romeo', email: 'romeo@gmail.com' },
            { id: 3, nama: 'Juliet Capulet', username: 'juliet', email: 'juliet@gmail.com' }
        ];

        let deleteTargetId = null;

        function renderTable() {
            const tbody = document.getElementById('table-body');
            tbody.innerHTML = '';
            dataUsers.forEach((user, index) => {
                tbody.innerHTML += `
                    <tr class="hover:bg-gray-50">
                        <td class="p-4 text-gray-500">${index + 1}</td>
                        <td class="p-4 font-medium text-gray-800">${user.nama}</td>
                        <td class="p-4 text-gray-600">@${user.username}</td>
                        <td class="p-4 text-gray-600">${user.email}</td>
                        <td class="p-4 text-center">
                            <div class="flex justify-center gap-2">
                                <a href="user-form.html?id=${user.id}" class="bg-blue-50 text-blue-600 px-3 py-1 rounded text-sm font-medium transition hover:bg-blue-100"><i class="fas fa-edit"></i> Edit</a>
                                <button onclick="openModal(${user.id})" class="bg-red-50 text-red-600 px-3 py-1 rounded text-sm font-medium transition hover:bg-red-100"><i class="fas fa-trash-alt"></i> Hapus</button>
                            </div>
                        </td>
                    </tr>
                `;
            });
        }

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('-translate-x-full');
            document.getElementById('sidebarOverlay').classList.toggle('hidden');
        }

        function openModal(id) {
            deleteTargetId = id;
            document.getElementById('deleteModal').classList.remove('hidden');
            setTimeout(() => { document.getElementById('modalContent').classList.replace('scale-95', 'scale-100'); }, 10);
        }

        function closeModal() {
            document.getElementById('modalContent').classList.replace('scale-100', 'scale-95');
            setTimeout(() => { document.getElementById('deleteModal').classList.add('hidden'); }, 150);
        }

        function confirmDelete() {
            dataUsers = dataUsers.filter(user => user.id !== deleteTargetId);
            renderTable();
            closeModal();
        }

        function openLogoutModal() {
            document.getElementById('logoutModal').classList.remove('hidden');
            setTimeout(() => { document.getElementById('logoutModalContent').classList.replace('scale-95', 'scale-100'); }, 10);
        }

        function closeLogoutModal() {
            document.getElementById('logoutModalContent').classList.replace('scale-100', 'scale-95');
            setTimeout(() => { document.getElementById('logoutModal').classList.add('hidden'); }, 150);
        }

        renderTable();
    </script>
</body>

</html>
