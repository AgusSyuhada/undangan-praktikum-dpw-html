<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Admin Undangan</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = { theme: { extend: { colors: { wedding: { primary: '#c19a6b' } } } } }
    </script>
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #f3f4f6;
        }
    </style>
</head>

<body class="flex items-center justify-center min-h-screen p-4">
    <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md border border-gray-100">
        <div class="text-center mb-8">
            <h1 class="text-2xl font-bold text-gray-800">Panel Admin</h1>
            <p class="text-sm text-gray-500">Silakan login untuk mengelola undangan</p>
        </div>
        <form id="loginForm" onsubmit="handleLogin(event)">
            <div class="mb-4">
                <label class="block text-sm font-medium text-gray-700 mb-1">Username atau Email</label>
                <input type="text" id="loginId"
                    class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-wedding-primary outline-none"
                    placeholder="admin / admin@undangan.com" required>
            </div>
            <div class="mb-6">
                <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
                <div class="relative">
                    <input type="password" id="password"
                        class="w-full px-4 py-2 pr-10 border rounded-lg focus:ring-2 focus:ring-wedding-primary outline-none"
                        placeholder="1234" required>
                    <button type="button" onclick="togglePassword('password', 'eyeIcon')"
                        class="absolute inset-y-0 right-0 pr-3 flex items-center text-gray-500 hover:text-wedding-primary focus:outline-none">
                        <i id="eyeIcon" class="fas fa-eye"></i>
                    </button>
                </div>
            </div>
            <button type="submit"
                class="w-full bg-wedding-primary hover:bg-yellow-700 text-white font-medium py-2 rounded-lg transition">
                Masuk Dashboard
            </button>
        </form>
    </div>
    <script>
        // Fungsi untuk Show/Hide Password
        function togglePassword(inputId, iconId) {
            const input = document.getElementById(inputId);
            const icon = document.getElementById(iconId);
            if (input.type === "password") {
                input.type = "text";
                icon.classList.remove("fa-eye");
                icon.classList.add("fa-eye-slash");
            } else {
                input.type = "password";
                icon.classList.remove("fa-eye-slash");
                icon.classList.add("fa-eye");
            }
        }

        function handleLogin(event) {
            event.preventDefault();
            const loginInput = document.getElementById('loginId').value;
            const pass = document.getElementById('password').value;

            // Logika bisa menggunakan username OR email
            if ((loginInput === 'admin' || loginInput === 'admin@undangan.com') && pass === '1234') {
                window.location.href = 'dashboard/rsvp.html';
            } else {
                alert('Username/Email atau password salah! Coba: admin / 1234');
            }
        }
    </script>
</body>

</html>
