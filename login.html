<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Admin Undangan</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script>
        tailwind.config = { theme: { extend: { colors: { wedding: { primary: '#c19a6b' } } } } }
    </script>
    <style> body { font-family: 'Poppins', sans-serif; background-color: #f3f4f6; } </style>
</head>
<body class="flex items-center justify-center min-h-screen">
    <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md border border-gray-100">
        <div class="text-center mb-8">
            <h1 class="text-2xl font-bold text-gray-800">Panel Admin</h1>
            <p class="text-sm text-gray-500">Silakan login untuk mengelola undangan</p>
        </div>
        <form id="loginForm" onsubmit="handleLogin(event)">
            <div class="mb-4">
                <label class="block text-sm font-medium text-gray-700 mb-1">Username</label>
                <input type="text" id="username" class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-wedding-primary outline-none" placeholder="admin" required>
            </div>
            <div class="mb-6">
                <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
                <input type="password" id="password" class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-wedding-primary outline-none" placeholder="1234" required>
            </div>
            <button type="submit" class="w-full bg-wedding-primary hover:bg-yellow-700 text-white font-medium py-2 rounded-lg transition">
                Masuk Dashboard
            </button>
        </form>
    </div>
    <script>
        function handleLogin(event) {
            event.preventDefault();
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            if(user === 'admin' && pass === '1234') {
                window.location.href = 'dashboard/rsvp.html';
            } else {
                alert('Username atau password salah! Coba: admin / 1234');
            }
        }
    </script>
</body>
</html>
