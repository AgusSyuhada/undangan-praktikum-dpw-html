<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            theme: { extend: { colors: { wedding: { primary: '#c19a6b' } } } }
        }
    </script>
    <style> body { font-family: 'Poppins', sans-serif; background-color: #f3f4f6; } </style>
</head>
<body class="flex h-screen overflow-hidden">

    <aside class="w-64 bg-white shadow-md h-full flex flex-col">
        <div class="p-6 border-b text-center">
            <h2 class="text-xl font-bold text-wedding-primary">Admin Panel</h2>
        </div>
        <nav class="flex-1 p-4 space-y-2">
            <button onclick="switchTab('tab-user')" id="btn-user" class="w-full text-left px-4 py-3 rounded-lg bg-wedding-primary text-white font-medium transition">
                <i class="fas fa-users mr-2"></i> Data Kehadiran (RSVP)
            </button>
            <button onclick="switchTab('tab-content')" id="btn-content" class="w-full text-left px-4 py-3 rounded-lg text-gray-600 hover:bg-gray-100 font-medium transition">
                <i class="fas fa-file-alt mr-2"></i> Data Isi Halaman
            </button>
        </nav>
        <div class="p-4 border-t">
            <a href="login.html" class="block w-full text-center px-4 py-2 text-red-600 hover:bg-red-50 rounded-lg transition">
                <i class="fas fa-sign-out-alt mr-2"></i> Logout
            </a>
        </div>
    </aside>

    <main class="flex-1 p-8 overflow-y-auto">
        
        <section id="tab-user" class="block">
            <h2 class="text-2xl font-bold text-gray-800 mb-6">Data Tamu Undangan</h2>
            <div class="bg-white rounded-xl shadow-sm overflow-hidden">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-gray-50 border-b">
                            <th class="p-4 text-sm font-semibold text-gray-600">Nama</th>
                            <th class="p-4 text-sm font-semibold text-gray-600">Kehadiran</th>
                            <th class="p-4 text-sm font-semibold text-gray-600">Ucapan</th>
                        </tr>
                    </thead>
                    <tbody id="user-table-body" class="divide-y">
                        </tbody>
                </table>
            </div>
        </section>

        <section id="tab-content" class="hidden">
            <h2 class="text-2xl font-bold text-gray-800 mb-6">Manajemen Konten Halaman</h2>
            <div class="bg-white rounded-xl shadow-sm overflow-hidden">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-gray-50 border-b">
                            <th class="p-4 text-sm font-semibold text-gray-600">Bagian (Section)</th>
                            <th class="p-4 text-sm font-semibold text-gray-600">Nilai / Teks</th>
                            <th class="p-4 text-sm font-semibold text-gray-600">Aksi</th>
                        </tr>
                    </thead>
                    <tbody id="content-table-body" class="divide-y">
                        </tbody>
                </table>
            </div>
        </section>

    </main>

    <script>
        // Dummy Data Arrays
        const dataUser = [
            { nama: 'Budi Santoso', hadir: 'Hadir', ucapan: 'Selamat menempuh hidup baru!' },
            { nama: 'Siti Aminah', hadir: 'Tidak Hadir', ucapan: 'Maaf berhalangan, semoga samawa.' },
            { nama: 'Andi Dermawan', hadir: 'Hadir', ucapan: 'Lancar sampai hari H bro!' }
        ];

        const dataContent = [
            { bagian: 'Nama Mempelai Pria', nilai: 'Romeo Montague, S.Kom.' },
            { bagian: 'Nama Mempelai Wanita', nilai: 'Juliet Capulet, S.E.' },
            { bagian: 'Tanggal Akad', nilai: '20 Juni 2026' },
            { bagian: 'Lokasi Resepsi', nilai: 'Hotel Pangeran Pekanbaru' }
        ];

        // Render Tabel User
        const userTbody = document.getElementById('user-table-body');
        dataUser.forEach(user => {
            userTbody.innerHTML += `
                <tr class="hover:bg-gray-50">
                    <td class="p-4 font-medium">${user.nama}</td>
                    <td class="p-4"><span class="px-3 py-1 rounded-full text-xs font-semibold ${user.hadir === 'Hadir' ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700'}">${user.hadir}</span></td>
                    <td class="p-4 text-gray-600 text-sm italic">"${user.ucapan}"</td>
                </tr>
            `;
        });

        // Render Tabel Konten
        const contentTbody = document.getElementById('content-table-body');
        dataContent.forEach(content => {
            contentTbody.innerHTML += `
                <tr class="hover:bg-gray-50">
                    <td class="p-4 font-medium text-gray-800">${content.bagian}</td>
                    <td class="p-4 text-gray-600">${content.nilai}</td>
                    <td class="p-4">
                        <button class="text-blue-500 hover:text-blue-700 text-sm font-medium"><i class="fas fa-edit"></i> Edit</button>
                    </td>
                </tr>
            `;
        });

        // Fungsi Switch Tab Navigation
        function switchTab(tabId) {
            // Sembunyikan semua section
            document.getElementById('tab-user').classList.add('hidden');
            document.getElementById('tab-content').classList.add('hidden');
            
            // Reset style semua tombol
            document.getElementById('btn-user').className = "w-full text-left px-4 py-3 rounded-lg text-gray-600 hover:bg-gray-100 font-medium transition";
            document.getElementById('btn-content').className = "w-full text-left px-4 py-3 rounded-lg text-gray-600 hover:bg-gray-100 font-medium transition";

            // Tampilkan section terpilih
            document.getElementById(tabId).classList.remove('hidden');
            document.getElementById(tabId).classList.add('block');

            // Aktifkan style tombol terpilih
            if (tabId === 'tab-user') {
                document.getElementById('btn-user').className = "w-full text-left px-4 py-3 rounded-lg bg-wedding-primary text-white font-medium transition";
            } else {
                document.getElementById('btn-content').className = "w-full text-left px-4 py-3 rounded-lg bg-wedding-primary text-white font-medium transition";
            }
        }
    </script>
</body>
</html>
